<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TTS · Hangar</title>
<style>
  :root{
    --bg:#050609; --steel1:#1a2130; --steel2:#0e131d; --edge:rgba(140,170,205,.16);
    --amber:#ffb454; --cyan:#63e6ff; --ink:#eaf2ff; --mut:#7c8ba3; --deny:#ff5470;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:"Inter",ui-sans-serif,system-ui,"Segoe UI",sans-serif;color:var(--ink);
    background:radial-gradient(120% 100% at 50% 0%,#0a0f1a,#050609 70%);
    min-height:100vh;overflow:hidden;display:grid;place-items:center}
  .hud-corner{position:fixed;width:34px;height:34px;border:2px solid rgba(99,230,255,.4);z-index:6}
  .hud-corner.tl{top:22px;left:22px;border-right:0;border-bottom:0}
  .hud-corner.tr{top:22px;right:22px;border-left:0;border-bottom:0}
  .hud-corner.bl{bottom:22px;left:22px;border-right:0;border-top:0}
  .hud-corner.br{bottom:22px;right:22px;border-left:0;border-top:0}
  .brand{position:fixed;top:26px;left:50%;transform:translateX(-50%);z-index:6;
    font-size:11px;letter-spacing:.5em;color:var(--mut);font-weight:600}
  .brand b{color:var(--cyan)}

  .frame{position:relative;z-index:2;width:min(92vw,620px);aspect-ratio:16/10;
    border-radius:14px;overflow:hidden;
    box-shadow:0 0 0 1px var(--edge),0 30px 80px rgba(0,0,0,.6),inset 0 0 0 1px rgba(255,255,255,.03)}

  /* warp horizon revealed behind doors */
  .space{position:absolute;inset:0;background:
    radial-gradient(80% 120% at 50% 118%,#ffd9a0 0%,#ff9d5c 12%,#8a3fd6 40%,#141a5a 68%,#05070f 100%)}
  .space canvas{position:absolute;inset:0}
  .horizon{position:absolute;left:0;right:0;bottom:0;height:44%;
    background:linear-gradient(0deg,rgba(255,180,84,.35),transparent);
    box-shadow:0 -1px 24px rgba(255,180,84,.4)}
  .space .grid{position:absolute;left:-50%;right:-50%;bottom:0;height:46%;
    background:
      linear-gradient(90deg,transparent 49.6%,rgba(99,230,255,.35) 50%,transparent 50.4%) 0 0/48px 100%,
      linear-gradient(0deg,rgba(99,230,255,.28) 0 1px,transparent 1px) 0 0/100% 26px;
    transform:perspective(340px) rotateX(70deg);transform-origin:bottom;opacity:.6;
    animation:floor 3s linear infinite}
  @keyframes floor{to{background-position:0 0,0 26px}}

  /* HUD scanline + readouts over the viewport */
  .scan{position:absolute;left:0;right:0;height:2px;top:0;z-index:4;pointer-events:none;
    background:linear-gradient(90deg,transparent,rgba(99,230,255,.8),transparent);
    box-shadow:0 0 14px rgba(99,230,255,.7);animation:scan 4.5s ease-in-out infinite}
  @keyframes scan{0%,100%{top:6%}50%{top:94%}}
  .readout{position:absolute;top:12px;left:14px;z-index:5;font-family:ui-monospace,monospace;
    font-size:9.5px;letter-spacing:.18em;color:rgba(99,230,255,.7);line-height:1.7}
  .readout.r{left:auto;right:14px;text-align:right;color:rgba(255,180,84,.7)}

  /* the two blast doors */
  .door{position:absolute;top:0;bottom:0;width:50%;z-index:3;
    background:
      linear-gradient(100deg,var(--steel1),var(--steel2));
    transition:transform 1.35s cubic-bezier(.72,0,.16,1)}
  .door::after{content:"";position:absolute;inset:0;opacity:.5;
    background:repeating-linear-gradient(0deg,rgba(255,255,255,.03) 0 2px,transparent 2px 5px),
      repeating-linear-gradient(0deg,transparent 0 54px,rgba(0,0,0,.35) 54px 58px)}
  .door.l{left:0;border-right:1px solid rgba(99,230,255,.25)}
  .door.r{right:0;border-left:1px solid rgba(99,230,255,.25)}
  /* chevron hazard stripe near the seam */
  .door .stripe{position:absolute;top:50%;transform:translateY(-50%);width:34px;height:52%;
    background:repeating-linear-gradient(45deg,#f2b23c 0 12px,#1a1a1a 12px 24px);opacity:.85;
    box-shadow:0 0 0 1px rgba(0,0,0,.4)}
  .door.l .stripe{right:0}.door.r .stripe{left:0}
  /* seam energy line */
  .seam{position:absolute;top:0;bottom:0;left:50%;width:3px;transform:translateX(-50%);z-index:4;
    background:linear-gradient(var(--cyan),#2b6fd6);box-shadow:0 0 18px var(--cyan);
    animation:seam 2s ease-in-out infinite}
  @keyframes seam{50%{opacity:.45}}

  /* granted → doors part, warp */
  .wrap.granted .door.l{transform:translateX(-100%)}
  .wrap.granted .door.r{transform:translateX(100%)}
  .wrap.granted .seam{opacity:0}
  .wrap.granted .space{animation:warp 1.3s ease forwards}
  @keyframes warp{0%{filter:brightness(1)}55%{filter:brightness(1.5) saturate(1.2)}100%{filter:brightness(1.12)}}
  .verdict{position:absolute;inset:0;display:grid;place-items:center;z-index:5;opacity:0;
    transition:opacity .6s ease .3s;text-align:center;pointer-events:none}
  .verdict b{font-size:26px;letter-spacing:.34em;color:#fff;text-shadow:0 0 30px var(--cyan)}
  .verdict small{display:block;margin-top:8px;font-size:11px;letter-spacing:.5em;color:var(--cyan)}
  .wrap.granted .verdict{opacity:1}

  /* deny */
  .wrap.deny .frame{animation:shake .5s}
  .wrap.deny .seam{background:var(--deny);box-shadow:0 0 22px var(--deny)}
  .wrap.deny .scan{background:linear-gradient(90deg,transparent,rgba(255,84,112,.9),transparent)}
  @keyframes shake{20%{transform:translateX(-8px)}45%{transform:translateX(8px)}70%{transform:translateX(-5px)}}

  /* auth console */
  .auth{position:relative;z-index:5;margin-top:26px;width:min(92vw,480px)}
  .auth .bar{display:flex;align-items:center;gap:10px;padding:8px 8px 8px 16px;
    background:rgba(10,16,26,.7);border:1px solid var(--edge);border-radius:12px;backdrop-filter:blur(10px);
    transition:border-color .25s,box-shadow .25s}
  .auth .bar:focus-within{border-color:rgba(99,230,255,.55);box-shadow:0 0 0 3px rgba(99,230,255,.1)}
  .tag{font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.2em;color:var(--cyan);
    border:1px solid rgba(99,230,255,.3);border-radius:6px;padding:5px 8px;white-space:nowrap}
  input{flex:1;background:transparent;border:0;outline:none;color:var(--ink);
    font-size:15px;letter-spacing:.16em;padding:10px 4px}
  input::placeholder{color:#5b6f89;letter-spacing:.26em;font-size:13px}
  button{border:0;cursor:pointer;border-radius:9px;padding:12px 20px;font-weight:700;
    letter-spacing:.16em;font-size:12px;color:#04222b;
    background:linear-gradient(150deg,#8ff0ff,#31b6e8);box-shadow:0 4px 20px rgba(99,230,255,.3)}
  button:hover{filter:brightness(1.06)}button:active{transform:translateY(1px)}
  .status{height:15px;margin-top:11px;text-align:center;font-family:ui-monospace,monospace;
    font-size:10.5px;letter-spacing:.28em;color:var(--deny);opacity:0;transition:opacity .2s}
  .wrap.deny .status{opacity:1}
  .wrap.granted .auth{opacity:0;transform:translateY(14px);transition:.5s;pointer-events:none}
</style>
</head>
<body>
<div class="hud-corner tl"></div><div class="hud-corner tr"></div>
<div class="hud-corner bl"></div><div class="hud-corner br"></div>
<div class="brand"><b>TTS</b> AEROSPACE · BAY 07 · CLEARANCE REQUIRED</div>

<div class="wrap" id="wrap">
  <div class="frame">
    <div class="space">
      <canvas id="stars"></canvas>
      <div class="grid"></div>
      <div class="horizon"></div>
    </div>
    <div class="readout">SYS: TTS-HANGAR<br>PWR: ██████ 100%<br>LOCK: ENGAGED</div>
    <div class="readout r">BAY 07<br>SEAL: MAGLEV<br>ID: ///PENDING</div>

    <div class="door l"><span class="stripe"></span></div>
    <div class="door r"><span class="stripe"></span></div>
    <div class="seam"></div>
    <div class="scan"></div>

    <div class="verdict"><div><b>CLEARANCE GRANTED</b><small>WELCOME BACK · TTS</small></div></div>
  </div>

  <form class="auth" id="form" autocomplete="off">
    <div class="bar">
      <span class="tag">◈ CIPHER</span>
      <input id="pw" type="password" placeholder="ENTER ACCESS CIPHER" autofocus />
      <button type="submit">RELEASE SEAL</button>
    </div>
    <div class="status" id="status">⨯ CIPHER INVALID — MAGLEV SEAL HOLDS</div>
  </form>
</div>

<script>
  const KEY="T0talt3ch25#";
  const wrap=document.getElementById('wrap'),form=document.getElementById('form'),pw=document.getElementById('pw');

  // starfield inside the viewport
  const cv=document.getElementById('stars'),cx=cv.getContext('2d');let W,H,stars;
  function size(){const r=cv.getBoundingClientRect();W=cv.width=r.width;H=cv.height=r.height;
    stars=Array.from({length:90},()=>({x:Math.random()*W,y:Math.random()*H*.7,
      z:Math.random(),s:Math.random()*1.5+.3}));}
  size();addEventListener('resize',size);
  (function draw(){cx.clearRect(0,0,W,H);
    for(const s of stars){s.x+=(.05+s.z*.15);if(s.x>W)s.x=0;
      cx.globalAlpha=.3+s.z*.6;cx.fillStyle=s.z>.75?'#8ff0ff':'#d9e6ff';
      cx.fillRect(s.x,s.y,s.s,s.s);}
    cx.globalAlpha=1;requestAnimationFrame(draw);})();

  form.addEventListener('submit',e=>{
    e.preventDefault();
    if(wrap.classList.contains('granted'))return;
    if(pw.value===KEY){wrap.classList.remove('deny');wrap.classList.add('granted');}
    else{wrap.classList.remove('deny');void wrap.offsetWidth;wrap.classList.add('deny');pw.select();
      setTimeout(()=>wrap.classList.remove('deny'),1500);}
  });
</script>
</body>
</html>
